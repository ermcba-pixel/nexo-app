<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXO - Login Admin</title>
<style>
body{font-family:Arial;background:#4A6B6D;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{background:#fff;padding:30px;border-radius:15px;width:350px}
input{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:8px}
button{width:100%;padding:12px;background:#4A6B6D;color:#fff;border:none;border-radius:8px;font-weight:bold}
</style>
</head>
<body>

<div class="box">
<h2>Ingreso Admin</h2>

<label>Correo electrónico</label>
<input type="email" id="emailInput" placeholder="tu@correo.com">

<label>Contraseña</label>
<input type="password" id="passwordInput" placeholder="Ingresa tu contraseña">

<button onclick="validarLogin()">INGRESAR AL PANEL</button>
</div>

<script>
function validarLogin(){
  var pass = document.getElementById('passwordInput').value.trim();

  if(pass === "Lolo1234@"){
    localStorage.setItem('nexoAdminAuth','ok');
    window.location.href = 'nexo-admin-panel.html';
    return false;
  }

  alert("Contraseña incorrecta");
}
</script>

</body>
</html>
