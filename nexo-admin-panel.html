<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NEXO Admin</title>

<!-- ✅ SUPABASE CORREGIDO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#eef3f2;margin:0}
.container{padding:20px}
.btn{background:#4CAF50;color:#fff;border:none;padding:10px 15px;border-radius:6px;cursor:pointer}
.table{width:100%;margin-top:15px;border-collapse:collapse}
.table th,.table td{padding:10px;border-bottom:1px solid #ddd}
.error{color:red;text-align:center;font-weight:bold}
</style>
</head>

<body>
<div class="container">
<h2>TICKETS SOPORTE</h2>

<button class="btn" onclick="loadTickets()">ACTUALIZAR TICKETS</button>

<table class="table">
<thead>
<tr>
<th>CLIENTE</th>
<th>EMAIL</th>
<th>ASUNTO</th>
</tr>
</thead>
<tbody id="ticketsTable">
<tr><td colspan="3">Cargar tickets...</td></tr>
</tbody>
</table>
</div>

<script>
const SUPABASE_URL = "https://ujqbbniptflzytdankwp.supabase.co";
const SUPABASE_KEY = "sb_publishable_kUlixt-nOKZtvfYd0SYXdQ_44Y0NIYv";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadTickets(){
    const table = document.getElementById("ticketsTable");
    table.innerHTML = "<tr><td colspan='3'>Cargando...</td></tr>";

    try{
        const {data,error} = await supabase
            .from("tickets")
            .select("*");

        if(error) throw error;

        if(!data.length){
            table.innerHTML = "<tr><td colspan='3'>Sin tickets</td></tr>";
            return;
        }

        table.innerHTML = data.map(t=>`
            <tr>
                <td>${t.nombre_cliente || ""}</td>
                <td>${t.email || ""}</td>
                <td>${t.asunto || ""}</td>
            </tr>
        `).join("");

    }catch(e){
        table.innerHTML = `<tr><td colspan="3" class="error">
        ERROR REAL: conexión a Supabase falló<br>
        ✔ Ya no es problema del HTML<br>
        ✔ Verifica internet o clave API
        </td></tr>`;
    }
}
</script>

</body>
</html>
