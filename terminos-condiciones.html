<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nexo™</title>
<style>
:root{--primary:#4A6B6D;--secondary:#5A7C7E;--light:#E8F0F0;--white:#fff;--dark:#2D3E3F;--accent:#7AC742;}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Tahoma,Verdana,sans-serif;background:linear-gradient(135deg,var(--primary),var(--secondary));color:var(--dark);padding:36px 18px;}
.page{max-width:1120px;margin:0 auto;background:var(--white);border-radius:28px;padding:42px;box-shadow:0 25px 70px rgba(0,0,0,.22);}
.top{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:28px;}
.back{background:var(--dark);color:#fff;text-decoration:none;border-radius:10px;padding:14px 22px;font-weight:900;}
.brand{font-weight:900;font-size:18px}
.langs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 28px}
.langs button{border:2px solid var(--primary);background:#fff;color:var(--dark);border-radius:10px;padding:9px 14px;font-weight:800;cursor:pointer}
.langs button.active{background:var(--accent);border-color:var(--accent);color:#fff}
h1{font-size:38px;color:var(--primary);margin:0 0 24px}
h2{font-size:25px;color:var(--primary);margin:28px 0 12px}
p,li{font-size:18px;line-height:1.75}
ul{padding-left:24px}
.footer{margin-top:36px;padding-top:18px;border-top:1px solid #dbe7e5;text-align:center;font-size:13px;color:#607476}
@media(max-width:720px){.page{padding:26px}.top{flex-direction:column;align-items:flex-start}h1{font-size:30px}p,li{font-size:16px}}
</style>
</head>
<body>
<main class="page">
  <div class="top">
    <a class="back" id="backBtn" href="index.html">← Volver al portal</a>
    <div class="brand">nexo Servicios Generales y Empresariales</div>
  </div>
  <div class="langs">
    <button data-lang="es">Español</button>
    <button data-lang="en">English</button>
    <button data-lang="pt">Português</button>
    <button data-lang="it">Italiano</button>
    <button data-lang="fr">Français</button>
  </div>
  <h1 id="pageTitle"></h1>
  <div id="pageBody"></div>
  <div class="footer" id="pageFooter"></div>
</main>
<script>
const PAGE_DATA = {"es": ["Términos y Condiciones", [["Aceptación", ["Al utilizar nexo, el cliente acepta estas condiciones y reconoce que nexo actúa como intermediario comercial internacional."]], ["Compra e intermediación", ["El pago del cliente puede cubrir producto, logística internacional, costos del proveedor, costos operativos y comisión de intermediación de nexo."]], ["Proveedor original", ["La disponibilidad, variantes, garantías, cambios, devoluciones, tiempos y condiciones finales pueden depender del proveedor o marketplace de origen."]]]], "en": ["Terms and Conditions", [["Acceptance", ["By using nexo, the customer accepts these terms and acknowledges that nexo acts as an international commercial intermediary."]], ["Purchase and intermediation", ["The customer payment may cover the product, international logistics, supplier costs, operating costs and nexo intermediation commission."]], ["Original provider", ["Availability, variants, warranties, exchanges, returns, timing and final conditions may depend on the original provider or marketplace."]]]], "pt": ["Termos e Condições", [["Aceitação", ["Ao usar a nexo, o cliente aceita estas condições e reconhece que a nexo atua como intermediária comercial internacional."]], ["Compra e intermediação", ["O pagamento do cliente pode cobrir produto, logística internacional, custos do fornecedor, custos operacionais e comissão de intermediação da nexo."]], ["Fornecedor original", ["Disponibilidade, variantes, garantias, trocas, devoluções, prazos e condições finais podem depender do fornecedor ou marketplace de origem."]]]], "it": ["Termini e Condizioni", [["Accettazione", ["Utilizzando nexo, il cliente accetta queste condizioni e riconosce che nexo agisce come intermediario commerciale internazionale."]], ["Acquisto e intermediazione", ["Il pagamento del cliente può coprire prodotto, logistica internazionale, costi del fornitore, costi operativi e commissione di intermediazione nexo."]], ["Fornitore originale", ["Disponibilità, varianti, garanzie, cambi, resi, tempi e condizioni finali possono dipendere dal fornitore o marketplace di origine."]]]], "fr": ["Conditions générales", [["Acceptation", ["En utilisant nexo, le client accepte ces conditions et reconnaît que nexo agit comme intermédiaire commercial international."]], ["Achat et intermédiation", ["Le paiement du client peut couvrir le produit, la logistique internationale, les coûts du fournisseur, les coûts opérationnels et la commission d’intermédiation de nexo."]], ["Fournisseur d’origine", ["La disponibilité, les variantes, garanties, échanges, retours, délais et conditions finales peuvent dépendre du fournisseur ou marketplace d’origine."]]]]};
function getLang(){
  const p = new URLSearchParams(location.search).get('lang');
  return (p || localStorage.getItem('nexoLang') || localStorage.getItem('nexo_language') || 'es').slice(0,2).toLowerCase();
}
function setLang(lang){
  localStorage.setItem('nexoLang', lang);
  localStorage.setItem('nexo_language', lang);
  history.replaceState(null,'', location.pathname + '?lang=' + encodeURIComponent(lang));
  applyLang();
}
function applyLang(){
  const lang = getLang();
  const d = PAGE_DATA[lang] || PAGE_DATA.es;
  document.documentElement.lang = lang;
  document.querySelectorAll('.langs button').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang));
  document.getElementById('backBtn').textContent = {
    es:'← Volver al portal', en:'← Back to portal', pt:'← Voltar ao portal', it:'← Torna al portale', fr:'← Retour au portail'
  }[lang] || '← Volver al portal';
  document.getElementById('pageTitle').textContent = d[0];
  document.getElementById('pageBody').innerHTML = d[1].map(section => {
    const title = section[0];
    const lines = section[1];
    return '<section><h2>'+title+'</h2>' + lines.map(x=>'<p>'+x+'</p>').join('') + '</section>';
  }).join('');
  document.getElementById('pageFooter').innerHTML = {
    es:'nexo™ – Plataforma de Intermediación Comercial Internacional<br>© 2026 nexo™ – Todos los derechos reservados',
    en:'nexo™ – International Commercial Intermediation Platform<br>© 2026 nexo™ – All rights reserved',
    pt:'nexo™ – Plataforma de Intermediação Comercial Internacional<br>© 2026 nexo™ – Todos os direitos reservados',
    it:'nexo™ – Piattaforma di Intermediazione Commerciale Internazionale<br>© 2026 nexo™ – Tutti i diritti riservati',
    fr:'nexo™ – Plateforme d’Intermédiation Commerciale Internationale<br>© 2026 nexo™ – Tous droits réservés'
  }[lang] || '';
}
document.querySelectorAll('.langs button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
applyLang();
</script>
</body>
</html>
