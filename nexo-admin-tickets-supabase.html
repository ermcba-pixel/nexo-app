<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>nexo - Panel Admin Tickets</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Tahoma,sans-serif;background:linear-gradient(135deg,#4a6b6d,#6c948e);color:#102038;min-height:100vh;padding:18px}.wrap{max-width:1400px;margin:auto}.hero{background:#08152f;color:white;border-radius:22px;padding:18px;display:flex;justify-content:space-between;gap:12px;align-items:center;box-shadow:0 18px 45px rgba(0,0,0,.18)}h1{margin:0;font-size:28px}.small{font-size:12px;opacity:.85}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}.toolbar input,.toolbar select,.toolbar button,textarea{border:1px solid #c7d5d1;border-radius:10px;padding:11px;font-family:inherit}.toolbar button,.btn{background:#09152e;color:white;border:none;font-weight:800;cursor:pointer}.grid{display:grid;grid-template-columns:1fr 420px;gap:14px}.card{background:rgba(255,255,255,.96);border-radius:18px;padding:14px;box-shadow:0 10px 28px rgba(0,0,0,.10)}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid #e1e8e6;padding:10px;text-align:left;vertical-align:top}th{background:#f6f8f8;font-size:11px;text-transform:uppercase}.pill{display:inline-block;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:800;background:#eef4f2}.ticket-row{cursor:pointer}.ticket-row:hover{background:#f6f8f8}.detail h2{margin-top:0}.muted{color:#607080;font-size:12px}.msg{white-space:pre-wrap;background:#f6f8f8;border-radius:12px;padding:12px;margin:10px 0;line-height:1.5}.actions{display:grid;gap:8px}.actions button{padding:11px;border-radius:10px;border:none;background:#09152e;color:#fff;font-weight:800;cursor:pointer}.actions .close{background:#4a6b6d}@media(max-width:900px){.grid{grid-template-columns:1fr}.hero{display:block}}</style></head><body><div class="wrap"><section class="hero"><div><h1>Panel Admin · Tickets reales</h1><div class="small">nexo Servicios Generales y Empresariales · Supabase conectado</div></div><div class="small" id="status">Cargando...</div></section><div class="toolbar"><input id="search" placeholder="Buscar por cliente, email, asunto..." oninput="renderTickets()"><select id="estado" onchange="renderTickets()"><option value="">Todos los estados</option><option>Nuevo</option><option>En revisión</option><option>Respondido</option><option>Cerrado</option></select><select id="prioridad" onchange="renderTickets()"><option value="">Todas las prioridades</option><option>Baja</option><option>Media</option><option>Alta</option><option>Urgente</option></select><button class="btn" onclick="loadTickets()">Actualizar</button></div><section class="grid"><div class="card"><table><thead><tr><th>Fecha</th><th>Cliente</th><th>Asunto</th><th>Estado</th><th>Prioridad</th></tr></thead><tbody id="tbody"><tr><td colspan="5">Cargando tickets...</td></tr></tbody></table></div><div class="card detail" id="detail"><h2>Detalle del ticket</h2><p class="muted">Seleccione un ticket para revisar, responder o cerrar.</p></div></section></div><script>const URL='https://ujqbbniptflzytdankwp.supabase.co';const KEY='sb_publishable_kUlixt-nOKZtvfYd0SYXdQ_44Y0NIYv';const db=supabase.createClient(URL,KEY);let tickets=[];let selected=null;function fmt(d){return d?new Date(d).toLocaleString('es-BO'):''}async function loadTickets(){document.getElementById('status').textContent='Conectando a Supabase...';const {data,error}=await db.from('tickets').select('*').order('fecha_creacion',{ascending:false});if(error){document.getElementById('tbody').innerHTML='<tr><td colspan="5">Error: '+error.message+'</td></tr>';document.getElementById('status').textContent='Error';return;}tickets=data||[];document.getElementById('status').textContent=tickets.length+' tickets cargados';renderTickets();}function renderTickets(){const q=(document.getElementById('search').value||'').toLowerCase();const e=document.getElementById('estado').value;const p=document.getElementById('prioridad').value;const rows=tickets.filter(t=>(!e||t.estado===e)&&(!p||t.prioridad===p)&&(!q||[t.nombre_cliente,t.email,t.asunto,t.mensaje].join(' ').toLowerCase().includes(q)));document.getElementById('tbody').innerHTML=rows.length?rows.map(t=>`<tr class="ticket-row" onclick="showDetail('${t.id}')"><td>${fmt(t.fecha_creacion)}</td><td><b>${t.nombre_cliente||''}</b><br><span class="muted">${t.email||''}</span></td><td>${t.asunto||''}</td><td><span class="pill">${t.estado||''}</span></td><td><span class="pill">${t.prioridad||''}</span></td></tr>`).join(''):'<tr><td colspan="5">No hay tickets con ese filtro.</td></tr>';}function showDetail(id){selected=tickets.find(t=>t.id===id);if(!selected)return;document.getElementById('detail').innerHTML=`<h2>${selected.asunto||'Ticket'}</h2><p><b>Cliente:</b> ${selected.nombre_cliente||''}<br><b>Email:</b> ${selected.email||''}<br><b>Fecha:</b> ${fmt(selected.fecha_creacion)}<br><b>Tipo:</b> ${selected.tipo_reclamo||''}</p><div class="msg">${selected.mensaje||''}</div><div class="actions"><select id="newEstado"><option ${selected.estado==='Nuevo'?'selected':''}>Nuevo</option><option ${selected.estado==='En revisión'?'selected':''}>En revisión</option><option ${selected.estado==='Respondido'?'selected':''}>Respondido</option><option ${selected.estado==='Cerrado'?'selected':''}>Cerrado</option></select><textarea id="respuesta" placeholder="Escribir respuesta interna / seguimiento..."></textarea><button onclick="saveTicket()">Guardar seguimiento</button><button class="close" onclick="closeTicket()">Cerrar ticket</button></div>`;}async function saveTicket(){if(!selected)return;const estado=document.getElementById('newEstado').value;const respuesta=(document.getElementById('respuesta').value||'').trim();const {error}=await db.from('tickets').update({estado,fecha_actualizacion:new Date().toISOString()}).eq('id',selected.id);if(error){alert('Error actualizando ticket: '+error.message);return;}if(respuesta){await db.from('respuestas_ticket').insert([{ticket_id:selected.id,usuario_admin:'Superadmin nexo',mensaje:respuesta}]);}alert('Ticket actualizado.');await loadTickets();showDetail(selected.id);}async function closeTicket(){if(!selected)return;document.getElementById('newEstado').value='Cerrado';await saveTicket();}loadTickets();</script></body></html>
