<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0"><title>nexo™ - Opciones del producto</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--primary:#4A6B6D;--secondary:#5A7C7E;--accent:#7AC742;--light:#E8F0F0;--dark:#2D3E3F;--white:#fff}body{font-family:'Segoe UI',Tahoma,Verdana,sans-serif;background:linear-gradient(135deg,var(--primary),var(--secondary));min-height:100vh;padding:18px}.wrap{max-width:1280px;margin:auto;background:#fff;border-radius:26px;overflow:hidden;box-shadow:0 22px 60px rgba(0,0,0,.25)}header{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:24px 34px;display:flex;justify-content:space-between;align-items:center;gap:18px}.brand{display:flex;align-items:center;gap:18px}.logo{background:#fff;border-radius:14px;padding:8px 14px;font-weight:900;font-size:30px;color:var(--primary)}.logo .x{color:var(--accent)}h1{font-size:26px}.btn{border:0;border-radius:9px;background:var(--primary);color:#fff;padding:10px 16px;font-weight:900;cursor:pointer}.btn.light{background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.32)}main{padding:32px}.selected{display:grid;grid-template-columns:220px 1fr auto;gap:22px;align-items:center;background:linear-gradient(135deg,var(--light),rgba(122,199,66,.08));border:1px solid #d9e8e4;border-radius:18px;padding:20px;margin-bottom:28px}.selected img{width:100%;height:180px;object-fit:contain;background:#fff;border-radius:14px}.provider{display:inline-block;background:rgba(122,199,66,.16);padding:5px 10px;border-radius:999px;color:var(--primary);font-weight:900;font-size:12px;margin-bottom:8px}.price{font-size:26px;color:var(--accent);font-weight:900}.features{font-size:13px;line-height:1.55;color:var(--primary);margin-top:10px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px}.card{border:1px solid #d8e8e4;border-radius:16px;overflow:hidden;background:#f8fbfa;display:flex;flex-direction:column}.card img{width:100%;height:160px;object-fit:contain;background:#fff}.card-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}.card h3{font-size:14px;line-height:1.3;color:var(--dark)}.card .btn{margin-top:auto;width:100%}.note{background:#f4f9ef;border-left:5px solid var(--accent);border-radius:12px;padding:14px 16px;margin-bottom:20px;color:var(--primary);font-weight:700}.muted{font-size:12px;color:#6c7b7c}@media(max-width:850px){header,.selected{grid-template-columns:1fr;display:grid}.selected img{height:220px}}
</style>
</head>
<body><div class="wrap"><header><div class="brand"><div class="logo">ne<span class="x">x</span>o</div><div><h1 id="title">Opciones del producto</h1><div id="subtitle">Seleccione dentro de nexo™ sin abandonar la plataforma.</div></div></div><button class="btn light" onclick="location.href='nexo-tienda-cliente.html'">← Volver</button></header><main><div class="note" id="note">nexo™ mantiene al cliente dentro de la plataforma. El proveedor se gestiona internamente mediante la cuenta/API de nexo™.</div><section id="selected" class="selected"></section><h2 style="margin:22px 0;color:#2D3E3F" id="moreTitle">Más opciones disponibles</h2><div id="grid" class="grid"></div></main></div>
<script>
function lang(){return localStorage.getItem('nexoLang')||localStorage.getItem('nexo_language')||'es'}
const T={
 es:{title:'Opciones del proveedor',sub:'Elija las variantes del producto dentro de nexo™ sin salir al proveedor.',note:'nexo™ muestra opciones reales del proveedor, pero mantiene la compra dentro de la plataforma. El Agente 1 gestiona internamente la orden con la cuenta/API de nexo™.',more:'Más opciones disponibles del proveedor',add:'+ Carrito',selected:'Producto seleccionado',stock:'Stock',ship:'Envío CJ',ops:'Costos CJ',back:'← Volver'},
 en:{title:'Provider options',sub:'Choose product variants inside nexo™ without leaving to the provider.',note:'nexo™ shows real provider options while keeping the purchase inside the platform. Agent 1 manages the order internally through the nexo™ account/API.',more:'More provider options',add:'+ Cart',selected:'Selected product',stock:'Stock',ship:'CJ shipping',ops:'CJ costs',back:'← Back'},
 pt:{title:'Opções do fornecedor',sub:'Escolha as variantes do produto dentro da nexo™ sem sair para o fornecedor.',note:'A nexo™ mostra opções reais do fornecedor e mantém a compra dentro da plataforma. O Agente 1 gerencia internamente o pedido com a conta/API da nexo™.',more:'Mais opções do fornecedor',add:'+ Carrinho',selected:'Produto selecionado',stock:'Estoque',ship:'Envio CJ',ops:'Custos CJ',back:'← Voltar'},
 it:{title:'Opzioni del fornitore',sub:'Scegli le varianti del prodotto dentro nexo™ senza uscire verso il fornitore.',note:'nexo™ mostra opzioni reali del fornitore e mantiene l’acquisto dentro la piattaforma. L’Agente 1 gestisce internamente l’ordine con l’account/API di nexo™.',more:'Altre opzioni del fornitore',add:'+ Carrello',selected:'Prodotto selezionato',stock:'Stock',ship:'Spedizione CJ',ops:'Costi CJ',back:'← Indietro'},
 fr:{title:'Options du fournisseur',sub:'Choisissez les variantes du produit dans nexo™ sans sortir vers le fournisseur.',note:'nexo™ affiche les options réelles du fournisseur tout en gardant l’achat dans la plateforme. L’Agent 1 gère la commande en interne avec le compte/API de nexo™.',more:'Autres options du fournisseur',add:'+ Panier',selected:'Produit sélectionné',stock:'Stock',ship:'Livraison CJ',ops:'Coûts CJ',back:'← Retour'}
};
function t(k){const d=T[lang()]||T.es;return d[k]||T.es[k]||k}function money(n){return '$'+Number(n||0).toFixed(2)}function img(p){return p.image||p.imageUrl||p.photo||'assets/logo-nexo.png'}
function add(p){let cart=JSON.parse(localStorage.getItem('nexoCart')||'[]');let f=cart.find(x=>x.id===p.id); if(f)f.quantity=(f.quantity||1)+1; else cart.push({...p,quantity:1,features:features(p)}); localStorage.setItem('nexoCart',JSON.stringify(cart)); location.href='nexo-checkout.html'}
function features(p){return `<strong>${t('selected')}:</strong><br>• ${p.name||p.title}<br>• Proveedor original: ${p.provider||'CJ Dropshipping'}<br>• ${t('stock')}: ${p.stock||'Verificar al confirmar'}<br>• ${t('ship')}: ${money(p.cjShippingCost||p.shippingAmazon||0)}<br>• ${t('ops')}: ${money(p.cjHandlingFee||p.vendorFee||0)}`}
function card(p,big=false){return `<${big?'section':'div'} class="${big?'selected':'card'}"><img src="${img(p)}" onerror="this.src='assets/logo-nexo.png'"><div class="${big?'':'card-body'}"><span class="provider">${p.providerLogo||'🇨🇳'} ${p.provider||'CJ Dropshipping'}</span><h3>${p.name||p.title||'Producto'}</h3><div class="price">${money(p.price)}</div><div class="muted">${t('ship')}: ${money(p.cjShippingCost||p.shippingAmazon||0)} · ${t('ops')}: ${money(p.cjHandlingFee||p.vendorFee||0)}</div><div class="features">${features(p)}</div></div><button class="btn" onclick='add(${JSON.stringify(p).replace(/'/g,"&#39;")})'>${t('add')}</button></${big?'section':'div'}>`}
const selected=JSON.parse(localStorage.getItem('nexoSelectedProviderProduct')||'null');const opts=JSON.parse(localStorage.getItem('nexoProviderOptions')||'[]');document.getElementById('title').textContent=t('title');document.getElementById('subtitle').textContent=t('sub');document.getElementById('note').textContent=t('note');document.getElementById('moreTitle').textContent=t('more');if(selected){document.getElementById('selected').outerHTML=card(selected,true)}else{document.getElementById('selected').innerHTML='<p>No hay producto seleccionado.</p>'}document.getElementById('grid').innerHTML=(opts.filter(x=>!selected||x.id!==selected.id).slice(0,24).map(x=>card(x)).join('')||'<p>No hay más opciones cargadas.</p>');
</script></body></html>
