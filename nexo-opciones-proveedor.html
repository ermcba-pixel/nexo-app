<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0"><title>nexo™ - Opciones del producto</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--primary:#4A6B6D;--secondary:#5A7C7E;--accent:#7AC742;--light:#E8F0F0;--dark:#2D3E3F;--white:#fff}body{font-family:'Segoe UI',Tahoma,Verdana,sans-serif;background:linear-gradient(135deg,var(--primary),var(--secondary));min-height:100vh;padding:18px}.wrap{max-width:1280px;margin:auto;background:#fff;border-radius:26px;overflow:hidden;box-shadow:0 22px 60px rgba(0,0,0,.25)}header{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:24px 34px;display:flex;justify-content:space-between;align-items:center;gap:18px}.brand{display:flex;align-items:center;gap:18px}.logo{background:#fff;border-radius:14px;padding:8px 14px;font-weight:900;font-size:30px;color:var(--primary)}.logo .x{color:var(--accent)}h1{font-size:26px}.btn{border:0;border-radius:9px;background:var(--primary);color:#fff;padding:10px 16px;font-weight:900;cursor:pointer}.btn.light{background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.32)}main{padding:32px}.selected{display:grid;grid-template-columns:220px 1fr auto;gap:22px;align-items:center;background:linear-gradient(135deg,var(--light),rgba(122,199,66,.08));border:1px solid #d9e8e4;border-radius:18px;padding:20px;margin-bottom:28px}.selected img{width:100%;height:180px;object-fit:contain;background:#fff;border-radius:14px}.provider{display:inline-block;background:rgba(122,199,66,.16);padding:5px 10px;border-radius:999px;color:var(--primary);font-weight:900;font-size:12px;margin-bottom:8px}.price{font-size:26px;color:var(--accent);font-weight:900}.features{font-size:13px;line-height:1.55;color:var(--primary);margin-top:10px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px}.card{border:1px solid #d8e8e4;border-radius:16px;overflow:hidden;background:#f8fbfa;display:flex;flex-direction:column}.card img{width:100%;height:160px;object-fit:contain;background:#fff}.card-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}.card h3{font-size:14px;line-height:1.3;color:var(--dark)}.card .btn{margin-top:auto;width:100%}.note{display:none!important;background:#f4f9ef;border-left:5px solid var(--accent);border-radius:12px;padding:14px 16px;margin-bottom:20px;color:var(--primary);font-weight:700}.muted{font-size:12px;color:#6c7b7c}@media(max-width:850px){header,.selected{grid-template-columns:1fr;display:grid}.selected img{height:220px}}
</style>
</head>
<body><div class="wrap"><header><div class="brand"><div class="logo">ne<span class="x">x</span>o</div><div><h1 id="title">Opciones del producto</h1><div id="subtitle">Seleccione dentro de nexo™ sin abandonar la plataforma.</div></div></div><button class="btn light" onclick="nexoBackToStore()">← Volver</button></header><main><div class="note" id="note">nexo™ mantiene al cliente dentro de la plataforma. El proveedor se gestiona internamente mediante la cuenta/API de nexo™.</div><section id="selected" class="selected"></section><h2 style="margin:22px 0;color:#2D3E3F" id="moreTitle">Más opciones disponibles</h2><div id="grid" class="grid"></div></main></div>
<script>
function nexoBackToStore(){ location.href='nexo-tienda-cliente.html?restore=1'; }
function lang(){return localStorage.getItem('nexoLang')||localStorage.getItem('nexo_language')||'es'}
const T={es:{title:'Opciones del producto',sub:'Seleccione dentro de nexo™ sin abandonar la plataforma.',note:'nexo™ mantiene al cliente dentro de la plataforma. El proveedor se gestiona internamente mediante la cuenta/API de nexo™.',more:'Más opciones disponibles',add:'+ Carrito',selected:'Producto seleccionado',stock:'Stock',ship:'Envío proveedor',ops:'Costos proveedor',back:'← Volver'},en:{title:'Product options',sub:'Choose inside nexo™ without leaving the platform.',note:'nexo™ keeps the customer inside the platform. The provider is managed internally through the nexo™ account/API.',more:'More available options',add:'+ Cart',selected:'Selected product',stock:'Stock',ship:'Provider shipping',ops:'Provider costs',back:'← Back'},pt:{title:'Opções do produto',sub:'Escolha dentro da nexo™ sem sair da plataforma.',note:'A nexo™ mantém o cliente dentro da plataforma. O fornecedor é gerenciado internamente pela conta/API da nexo™.',more:'Mais opções disponíveis',add:'+ Carrinho',selected:'Produto selecionado',stock:'Estoque',ship:'Envio do fornecedor',ops:'Custos do fornecedor',back:'← Voltar'},it:{title:'Opzioni del prodotto',sub:'Scegli dentro nexo™ senza lasciare la piattaforma.',note:'nexo™ mantiene il cliente dentro la piattaforma. Il fornitore viene gestito internamente tramite account/API nexo™.',more:'Altre opzioni disponibili',add:'+ Carrello',selected:'Prodotto selezionato',stock:'Disponibilità',ship:'Spedizione fornitore',ops:'Costi fornitore',back:'← Indietro'},fr:{title:'Options du produit',sub:'Choisissez dans nexo™ sans quitter la plateforme.',note:'nexo™ garde le client dans la plateforme. Le fournisseur est géré en interne via le compte/API nexo™.',more:'Plus d’options disponibles',add:'+ Panier',selected:'Produit sélectionné',stock:'Stock',ship:'Livraison fournisseur',ops:'Coûts fournisseur',back:'← Retour'}};
function t(k){const d=T[lang()]||T.es;return d[k]||T.es[k]||k}function money(n){return '$'+Number(n||0).toFixed(2)}const NEXO_DEFAULT_PRODUCT_IMAGE='';function img(p){return p.image||p.imageUrl||p.photo||''}
function add(p){let cart=JSON.parse(localStorage.getItem('nexoCart')||'[]');let f=cart.find(x=>x.id===p.id); if(f)f.quantity=(f.quantity||1)+1; else cart.push({...p,quantity:1,features:features(p)}); localStorage.setItem('nexoCart',JSON.stringify(cart)); location.href='nexo-checkout.html'}
function features(p){return `<strong>${t('selected')}:</strong><br>• ${p.name||p.title}<br>• Proveedor original: ${p.provider||'CJ Dropshipping'}<br>• ${t('stock')}: ${p.stock||'Verificar al confirmar'}<br>• ${t('ship')}: ${money(p.cjShippingCost||p.shippingAmazon||0)}<br>• ${t('ops')}: ${money(p.cjHandlingFee||p.vendorFee||0)}`}
function card(p,big=false){const im=img(p);const imgHtml=im?`<img src="${im}" onerror="this.outerHTML='<div style=\'height:160px;display:flex;align-items:center;justify-content:center;background:#fff;color:#6b7c7d;font-size:12px;padding:10px;text-align:center\'>Imagen no disponible por API</div>'">`:`<div style="height:${big?'180':'160'}px;display:flex;align-items:center;justify-content:center;background:#fff;color:#6b7c7d;font-size:12px;padding:10px;text-align:center">Imagen no disponible por API</div>`;return `<${big?'section':'div'} class="${big?'selected':'card'}">${imgHtml}<div class="${big?'':'card-body'}"><span class="provider">${p.providerLogo||'🇨🇳'} ${p.provider||'CJ Dropshipping'}</span><h3>${p.name||p.title||'Producto'}</h3><div class="price">${money(p.price)}</div><div class="muted">${t('ship')}: ${money(p.cjShippingCost||p.shippingAmazon||0)} · ${t('ops')}: ${money(p.cjHandlingFee||p.vendorFee||0)}</div><div class="features">${features(p)}</div></div><button class="btn" onclick='add(${JSON.stringify(p).replace(/'/g,"&#39;")})'>${t('add')}</button></${big?'section':'div'}>`}
const selected=JSON.parse(localStorage.getItem('nexoSelectedProviderProduct')||'null');const opts=JSON.parse(localStorage.getItem('nexoProviderOptions')||'[]');document.getElementById('title').textContent=t('title');document.getElementById('subtitle').textContent=t('sub');document.getElementById('note').textContent=t('note');document.getElementById('moreTitle').textContent=t('more');if(selected){document.getElementById('selected').outerHTML=card(selected,true)}else{document.getElementById('selected').innerHTML='<p>No hay producto seleccionado.</p>'}const selectedProvider=String(selected?.provider||selected?.proveedor||'').toLowerCase();
const sameProviderOpts=opts.filter(x=>{
  if(!selected) return true;
  if(String(x.id)===String(selected.id)) return false;
  const px=String(x.provider||x.proveedor||'').toLowerCase();
  return selectedProvider ? px.includes(selectedProvider.split(' ')[0]) || selectedProvider.includes(px.split(' ')[0]) : true;
});
document.getElementById('grid').innerHTML=(sameProviderOpts.slice(0,24).map(x=>card(x)).join('')||'<p>No hay más opciones cargadas para este proveedor.</p>');
</script>

    fr:{title:'Plateforme d’Intermédiation Commerciale Internationale',company:'nexo Services Généraux et Entreprises – NIT : 774651015 – Bolivie',desc:'nexo™ agit exclusivement comme intermédiaire entre le client et les fournisseurs internationaux.',rights:'Tous droits réservés',legal:'Mentions légales',terms:'Conditions générales',privacy:'Confidentialité',cookies:'Cookies',refunds:'Remboursements',buyTitle:'Conditions légales d’achat nexo™',buyDesc:'nexo™ agit comme intermédiaire commercial international. Le client accepte que le paiement couvre le produit, la logistique, les coûts du fournisseur et la commission nexo™. Les garanties, échanges, retours et délais de livraison dépendent du fournisseur et de la logistique internationale.',accept:'J’accepte les conditions légales, la confidentialité, les paiements, les remboursements et la condition d’intermédiation commerciale internationale de nexo™.'}

  function lang(){return (localStorage.getItem('nexoLang')||localStorage.getItem('nexo_language')||document.documentElement.lang||'es').slice(0,2).toLowerCase();}
  function a(href,txt){return `<a href="${href}">${txt}</a>`;}

  window.nexoApplyLegalI18n=function(){

    document.querySelectorAll('[data-nexo-legal-footer], .nexo-left-legal-card, .nexo-left-legal, footer#nexoFooter, footer.nexo-footer, footer.nexo-legal-footer').forEach(el=>{el.innerHTML=legalHTML(t);});

    });
    const modalLegal=document.querySelector('#confirmationModal .nexo-checkout-legal');
    if(modalLegal){
      const chk = document.getElementById('nexoLegalAccept')?.checked ? 'checked' : '';

    }
  };
  document.addEventListener('DOMContentLoaded',()=>{nexoApplyLegalI18n(); setTimeout(nexoApplyLegalI18n,200); setTimeout(nexoApplyLegalI18n,700);});

</script>
